name: Surfer S2 Feature Scan
description: Guided capture for Surfer feature candidates beyond basic running control.
steps:
  - id: baseline_idle
    prompt: Make sure the Surfer S2 is online and idle. Keep the Aiper app open on the device overview.
    capture:
      rest: true
      shadow: true
      observe_seconds: 30
  - id: cleaning_start_and_progress
    prompt: Start a manual skimming run in the Aiper app. Leave any progress, duration, or end-time view visible.
    capture:
      rest: true
      shadow: true
      observe_seconds: 75
  - id: cleaning_cycle_details
    prompt: Inspect any cleaning progress, history, elapsed time, remaining time, or completion estimate shown in the app.
    capture:
      rest: true
      shadow: true
      observe_seconds: 45
  - id: basket_or_filter_state
    prompt: Inspect any basket, filter, debris, or maintenance state in the app. Do not reset maintenance during this step.
    capture:
      rest: true
      shadow: true
      observe_seconds: 45
  - id: clean_path_change
    prompt: Change the Surfer clean-path preference in the app once if that control is available.
    capture:
      rest: true
      shadow: true
      observe_seconds: 60
  - id: pause_or_stop
    prompt: Use pause if the app exposes it; otherwise stop the manual run. Leave the app on the resulting state view.
    capture:
      rest: true
      shadow: true
      observe_seconds: 75
  - id: return_or_pickup
    prompt: If the app exposes return, charge, park, or pickup control, trigger it now; otherwise continue without an action.
    capture:
      rest: true
      shadow: true
      observe_seconds: 75
  - id: settle
    prompt: Leave the device untouched so final REST and MQTT state can settle.
    capture:
      rest: true
      shadow: true
      observe_seconds: 60
