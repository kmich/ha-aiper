name: Bug Report
description: Create a report to help us improve ha-aiper.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! 
        Please remember that this integration uses unofficial cloud APIs. "Session Conflict" errors (Error 402) happen if you open the official mobile app while Home Assistant is running. This is a known limitation.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: Aiper Device Model
      description: e.g., Scuba X1, Surfer S2, HydroComm
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Integration Version
      description: e.g., v1.1.0
    validations:
      required: true
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: e.g., 2026.6.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Debug Logs or Diagnostics
      description: |
        CRITICAL: Please scrub your email, password, and AWS Access Keys before pasting.
        Go to Settings > Devices & Services > Aiper > click your device > "Download diagnostics".
    validations:
      required: true
