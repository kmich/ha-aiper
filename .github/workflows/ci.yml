name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Linting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Lint with Ruff
        run: |
          uv run --frozen ruff check custom_components/aiper/
          uv run --frozen ruff format --check custom_components/aiper/

      - name: Run unit tests
        run: uv run --frozen pytest tests/ -v --tb=short

  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master
