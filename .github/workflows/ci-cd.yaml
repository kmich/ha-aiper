name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pipeline:
    name: CI/CD Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: UV Install
        id: setup-uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Hassfest
        id: hassfest
        uses: home-assistant/actions/hassfest@master
        continue-on-error: true

      - name: HACS validation
        id: hacs
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands
        continue-on-error: true

      - name: UV Dependencies
        id: sync-uv
        run: uv sync --locked --group dev

      - name: Ruff
        id: ruff
        run: uv run --frozen ruff check custom_components/
        continue-on-error: true

      - name: Mypy
        id: mypy
        run: uv run --frozen mypy custom_components/
        continue-on-error: true

      - name: Run tests
        id: pytest
        run: uv run --frozen pytest
        continue-on-error: true

      - name: Check validation outcomes
        if: ${{ always() }}
        run: |
          failed=0

          check_step() {
            name="$1"
            outcome="$2"
            if [ "$outcome" = "success" ]; then
              echo "PASSED: ${name}"
              echo "::notice title=${name}::passed"
            else
              echo "FAILED: ${name} (outcome=${outcome})"
              echo "::error title=${name} failed::outcome=${outcome}"
              failed=1
            fi
          }

          check_step "hassfest" "${{ steps.hassfest.outcome }}"
          check_step "HACS validation" "${{ steps.hacs.outcome }}"
          check_step "uv setup" "${{ steps.setup-uv.outcome }}"
          check_step "uv dependencies" "${{ steps.sync-uv.outcome }}"
          check_step "Ruff" "${{ steps.ruff.outcome }}"
          check_step "mypy" "${{ steps.mypy.outcome }}"
          check_step "pytest" "${{ steps.pytest.outcome }}"

          exit "$failed"

      - name: Version
        id: version
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: uv run --frozen .github/scripts/check_version_state.py

      - name: Create release
        if: ${{ steps.version.outputs.release_candidate == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          zip -r aiper.zip custom_components/aiper
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "${tag}"
          git push origin "${tag}"
          gh release create "${tag}" aiper.zip \
            --title "${tag}" \
            --notes "Release ${tag}"
