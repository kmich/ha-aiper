name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hacs/action@main
        with:
          category: integration

  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run --frozen ruff check custom_components/ tests/ tools/ .github/scripts/
      - run: uv run --frozen ruff format --check custom_components/ tests/ tools/ .github/scripts/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run --frozen mypy custom_components/ tests/ tools/ .github/scripts/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run --frozen pytest tests/ -v --tb=short

  no-bytecode:
    name: No bytecode in repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fail if bytecode files are tracked by git
        run: |
          if git ls-files | grep -E '(__pycache__|\.pyc$|\.pyo$)'; then
            echo "ERROR: Bytecode files are tracked by git."
            echo "Fix: git rm -r --cached custom_components/aiper/__pycache__"
            exit 1
          fi
          echo "OK: No bytecode files tracked."

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"
      - run: uv sync --locked --group dev
      - run: uv run --frozen .github/scripts/check_version_state.py
