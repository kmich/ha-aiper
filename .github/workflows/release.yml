name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  preflight:
    name: Preflight checks (lint + hassfest + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

      - name: hassfest
        uses: home-assistant/actions/hassfest@master

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Ruff lint and format
        run: |
          uv run --frozen ruff check custom_components/ tests/ tools/ .github/scripts/
          uv run --frozen ruff format --check custom_components/ tests/ tools/ .github/scripts/

      - name: Mypy
        run: uv run --frozen mypy custom_components/ tests/ tools/ .github/scripts/

      - name: Unit tests
        run: uv run --frozen pytest tests/ -v

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sanity check manifest version matches tag
        run: |
          python - <<'PY'
          import json
          import pathlib
          import sys

          tag = "${{ steps.version.outputs.VERSION }}"
          manifest = json.loads(pathlib.Path("custom_components/aiper/manifest.json").read_text(encoding="utf-8"))
          version = manifest.get("version")
          if version != tag:
              print(f"ERROR: manifest.json version {version!r} != tag {tag!r}")
              sys.exit(1)
          print("OK: manifest version matches tag:", version)
          PY

      - name: Build release zip
        run: |
          cd custom_components/aiper
          zip -r ../../aiper.zip . \
            --exclude '*/__pycache__/*' \
            --exclude '*/__pycache__' \
            --exclude '*.pyc' \
            --exclude '*.pyo' \
            --exclude '*$py.class'
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          draft: false
          prerelease: false
          files: aiper.zip
          generate_release_notes: true
